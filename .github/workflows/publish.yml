name: NPM Package

on:
  release:
    types: [published]

jobs:
  build:
    name: Build 
    runs-on: ubuntu-latest
    steps:
      - name: Chekout Repo
        uses: actions/checkout@v7
      - name: Node Setup
        uses: actions/setup-node@v7
        with:
          node-version: 22
      - run: npm ci

  publish-npm:
    name: Publish to NPM
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Chekout Repo
        uses: actions/checkout@v7
      - name: Node Setup
        uses: actions/setup-node@v7
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org/
      - name: Install Dependencies
        run: npm ci
      - name: Publish to NPM
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{secrets.NPM_AUTH_TOKEN}}
